<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ce l'hai fatta!!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .page-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1, #f0e6ff);
            padding: 20px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a4a4a;
            text-align: center;
            background-color: #ffe5ec;
        }

        .container {
            background: rgba(255, 255, 255, 0.65);
            padding: 30px 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 10;
            animation: popIn 1s ease-out;
            width: 90%;
            max-width: 360px;
            word-wrap: break-word;
        }

        h1 {
            font-size: 1.7rem;
            color: #ff477e;
            margin-bottom: 15px;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .animation-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
        }

        .main-star {
            font-size: 80px;
            animation: Bounce 2s infinite ease-in-out; 
            display: inline-block;
        }

        .audio-control {
            background-color: #ff477e;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
            -webkit-tap-highlight-color: transparent;
        }

        .audio-control:hover {
            background-color: #ff7096;
            transform: scale(1.05);
        }

        .dog-confetti {
            position: absolute;
            top: -60px;
            font-size: 2rem;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes Bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(115vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="none">
        <source src="./congratulations.m4a" type="audio/mp4">
        Il tuo browser non supporta l'elemento audio.
    </audio>

    <div class="page-wrapper" id="wrapper">
        <div class="container">
            <h1>Congratulations <br/>super goldsmith!!</h1>
            <p>
                Io non avevo dubbi... sapevo che con due gocce di Bach tutto sarebbe andato per il meglio 🙂‍↔️ <br/><br/>
                Sei riuscita a superare anche questa paura, stai proprio crescendo!!
                Ora vai a fare detox con un gin tonic per festeggiare!! 
            </p>
            
            <div class="animation-container">
                <span class="main-star">🏆</span>
            </div>

            <button class="audio-control" onclick="startParty()">Dai inizio alla festa! 🐾</button>
        </div>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        const button = document.querySelector('.audio-control');
        let partyStarted = false;

        // FIX SAFARI: Sblocca l'interfaccia audio al primo tocco sullo schermo
        function sbloccaAudioSafari() {
            music.play().then(() => {
                music.pause();
            }).catch(e => console.log("In attesa..."));
            
            document.removeEventListener('touchstart', sbloccaAudioSafari);
            document.removeEventListener('click', sbloccaAudioSafari);
        }
        document.addEventListener('touchstart', sbloccaAudioSafari, { passive: true });
        document.addEventListener('click', sbloccaAudioSafari);

        function startParty() {
            if (music.paused) {
                // FIX CRUCIALE: Forza Safari a reinizializzare il file m4a da zero
                if(music.readyState === 0) {
                    music.load();
                }
                
                music.play()
                    .then(() => {
                        button.innerText = "Musica ON! 🎶";
                    })
                    .catch(e => {
                        // Estremo tentativo: se Safari fa ancora muro, prova a mutare e smutare al volo
                        music.muted = true;
                        music.play().then(() => {
                            music.muted = false;
                            button.innerText = "Musica ON! 🎶";
                        });
                    });
            } else {
                music.pause();
                button.innerText = "Riprendi la festa! 🐾";
                return;
            }

            if (partyStarted) return;
            partyStarted = true;

            const dogEmojis = ['🐶', '🐕', '🐩', '🐾', '🎉', '✨', '🧁'];
            const wrapper = document.getElementById('wrapper');
            
            setInterval(() => {
                const confetti = document.createElement('div');
                confetti.classList.add('dog-confetti');
                confetti.innerText = dogEmojis[Math.floor(Math.random() * dogEmojis.length)];
                
                const maxWidth = window.innerWidth - 40;
                confetti.style.left = Math.random() * maxWidth + 'px';
                confetti.style.animationDuration = (Math.random() * 3 + 3) + 's';
                
                wrapper.appendChild(confetti);

                setTimeout(() => {
                    confetti.remove();
                }, 6000);
            }, 350);
        }
    </script>
</body>
</html>
